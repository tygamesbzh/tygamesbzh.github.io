---
layout: page
---

<section class="page-hero bg-offwhite">
  <div class="section-container flex items-center justify-between gap-4 flex-wrap">
    <h1 class="page-title text-ink">{{ page.hero_h1 }}</h1>
    <a href="{{ page.pdf_path | relative_url }}" download class="btn-outline text-sm py-2 px-4">{{ page.download_label }}</a>
  </div>
</section>

<section class="bg-offwhite pb-16">
  <div class="section-container">
    <iframe
      src="{{ page.pdf_path | relative_url }}"
      class="pdf-viewer"
      title="{{ page.pdf_title }}"></iframe>
    {% if page.disclaimer %}
    <p class="mt-4 text-sm text-ink/70">{{ page.disclaimer }}</p>
    {% endif %}
  </div>
</section>
