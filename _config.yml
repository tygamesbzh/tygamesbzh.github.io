title: TyGAMES
tagline: "Coopérative de jeu vidéo basée en Bretagne"
description: "On développe, on publie, on partage — autrement"
baseurl: ""
url: "https://tygames.coop"
lang: fr

email: contact@tygames.coop
location: Rennes, Bretagne

collections:
  games:
    output: true
    permalink: /jeux/:name/

defaults:
  - scope:
      path: ""
      type: games
    values:
      layout: game
      lang: fr

  - scope:
      path: "en"
    values:
      lang: en

plugins:
  - jekyll-seo-tag

exclude:
  - node_modules/
  - package.json
  - package-lock.json
  - tailwind.config.js
  - assets/css/input.css
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .github/
  - README.md
  - design_handoff_tygames/
